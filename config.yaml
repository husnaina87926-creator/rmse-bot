account:
  size_usd: 100
  risk_per_trade_pct: 4.0    # highest-safe (10yr regime: CAGR 6.7%, maxDD ~31%; 5%+ = danger)
  leverage: 500              # leverage is NOT risk (only sets margin); 500 already ample
risk:
  reward_ratio: 2.0
  atr_period: 14
  sl_atr_mult: 1.5
  max_daily_loss_pct: 6.0     # stop opening new trades if today's loss exceeds this
  max_open_trades: 5
  max_trades_per_day: 5       # cap new trades opened per calendar day
exits:
  breakeven_atr: 1.0          # move stop to entry once +1 ATR in profit (validated)
  trail_atr: 0.0              # trailing disabled (hurt the momentum edge in tests)
news_filter:
  enabled: true               # skip new trades around high-impact news (NFP/CPI/FOMC)
  currencies: [USD]           # gold is USD-priced
  impacts: [High]
  window_min: 30              # block +/- 30 min around an event
regime_filter:                # only trade when DAILY trend is up (10yr: +$7 -> +$110, survives bear)
  enabled: true
  ema_period: 100
  rise_n: 20
signal:
  confidence_threshold: 70
  ema_fast: 9
  ema_slow: 21
  ema_trend: 200
  rsi_period: 14
strategy:                   # validated edge config (walk-forward)
  sl_atr: 2.0
  rr: 1.0
  max_hold: 24              # bars (15m) -> 6 hours
edge_rules:
  # EURUSD dropped 2026-06-14: lost money on EVERY tested strategy (ours, Turtle, RSI-2)
  # over 2.4yr — the edge is in gold. Re-add only if a robust EUR edge is found later.
  XAUUSD:
    - direction: buy
      when: [trend_up, rsi_overbought, high_vol]
crypto_rules:                 # separate from gold edge_rules; for Binance crypto bot
  # 8.5yr-validated ALL-WEATHER (2018-2026, all regimes): momentum WITH the daily regime.
  # BTC CAGR 14.7% win63% maxDD15% | ETH CAGR 14.6% win61% maxDD20% | same edge both = robust
  timeframe: 4h
  fee_pct: 0.2                # Binance taker round-turn
  exit: {sl_atr: 2.0, rr: 1.0, max_hold: 24, be_atr: 0.0}
  symbols: [BTCUSDT, ETHUSDT]
  rules:
    - direction: sell         # down regime: short bearish momentum
      regime: down
      when: [rsi_bear, high_vol, strong_trend]
    - direction: buy          # up regime: long bullish momentum
      regime: up
      when: [rsi_overbought, high_vol, strong_trend]
instruments:
  XAUUSD:
    contract_size: 100        # oz per 1.0 lot
    spread_price: 0.30        # price units (USD)
    slippage_price: 0.10
    commission_per_lot: 0.0
    swap_per_lot: 0.50        # overnight fee per lot per day
    yf_symbol: "GC=F"         # gold futures proxy for backtest
  EURUSD:
    contract_size: 100000
    spread_price: 0.00010
    slippage_price: 0.00005
    commission_per_lot: 3.5
    swap_per_lot: 0.10
    yf_symbol: "EURUSD=X"
  XAGUSD:                      # silver (research/diversification)
    contract_size: 5000
    spread_price: 0.030
    slippage_price: 0.010
    commission_per_lot: 0.0
    swap_per_lot: 0.10
  SPX500:                      # S&P 500 index (research/diversification)
    contract_size: 1
    spread_price: 0.50
    slippage_price: 0.20
    commission_per_lot: 0.0
    swap_per_lot: 0.20
  BTCUSDT:                     # Binance crypto (research; ~0.2% round-turn taker fee approximated)
    contract_size: 1
    spread_price: 60.0
    slippage_price: 60.0
    commission_per_lot: 0.0
    swap_per_lot: 0.0
  ETHUSDT:                     # Binance crypto (research; ~0.2% round-turn approximated)
    contract_size: 1
    spread_price: 3.0
    slippage_price: 3.0
    commission_per_lot: 0.0
    swap_per_lot: 0.0
