account:
  size_usd: 100
  risk_per_trade_pct: 3.0    # aggressive-but-survivable (20% blew up in backtest)
  leverage: 500              # Exness-style; margin = notional / leverage
risk:
  reward_ratio: 2.0
  atr_period: 14
  sl_atr_mult: 1.5
  max_daily_loss_pct: 6.0     # stop opening new trades if today's loss exceeds this
  max_open_trades: 5
  max_trades_per_day: 5       # cap new trades opened per calendar day
exits:
  breakeven_atr: 1.0          # move stop to entry once +1 ATR in profit (validated)
  trail_atr: 0.0              # trailing disabled (hurt the momentum edge in tests)
news_filter:
  enabled: true               # skip new trades around high-impact news (NFP/CPI/FOMC)
  currencies: [USD]           # gold is USD-priced
  impacts: [High]
  window_min: 30              # block +/- 30 min around an event
signal:
  confidence_threshold: 70
  ema_fast: 9
  ema_slow: 21
  ema_trend: 200
  rsi_period: 14
strategy:                   # validated edge config (walk-forward)
  sl_atr: 2.0
  rr: 1.0
  max_hold: 24              # bars (15m) -> 6 hours
edge_rules:
  # EURUSD dropped 2026-06-14: lost money on EVERY tested strategy (ours, Turtle, RSI-2)
  # over 2.4yr — the edge is in gold. Re-add only if a robust EUR edge is found later.
  XAUUSD:
    - direction: buy
      when: [trend_up, rsi_overbought, high_vol]
instruments:
  XAUUSD:
    contract_size: 100        # oz per 1.0 lot
    spread_price: 0.30        # price units (USD)
    slippage_price: 0.10
    commission_per_lot: 0.0
    swap_per_lot: 0.50        # overnight fee per lot per day
    yf_symbol: "GC=F"         # gold futures proxy for backtest
  EURUSD:
    contract_size: 100000
    spread_price: 0.00010
    slippage_price: 0.00005
    commission_per_lot: 3.5
    swap_per_lot: 0.10
    yf_symbol: "EURUSD=X"
  XAGUSD:                      # silver (research/diversification)
    contract_size: 5000
    spread_price: 0.030
    slippage_price: 0.010
    commission_per_lot: 0.0
    swap_per_lot: 0.10
  SPX500:                      # S&P 500 index (research/diversification)
    contract_size: 1
    spread_price: 0.50
    slippage_price: 0.20
    commission_per_lot: 0.0
    swap_per_lot: 0.20
  BTCUSDT:                     # Binance crypto (research; costs ~0.1% taker fee approximated)
    contract_size: 1
    spread_price: 20.0
    slippage_price: 20.0
    commission_per_lot: 0.0
    swap_per_lot: 0.0
