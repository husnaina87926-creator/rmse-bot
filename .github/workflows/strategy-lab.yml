name: strategy-lab

# Weekly: the bot composes & ranks its own strategies (robust profit), commits a
# leaderboard. Advisory — top strategies are CANDIDATES to forward-test, not auto-applied.

on:
  schedule:
    - cron: "30 22 * * 0"      # Sundays 22:30 UTC (before self-learning)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: strategy-lab
  cancel-in-progress: false

jobs:
  lab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy PyYAML dukascopy-python
      - name: Run strategy lab
        run: python scripts/run_strategy_lab.py
      - name: Commit leaderboard
        run: |
          git config user.name "rmse-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --no-edit --rebase || true
          git add reports/ state/strategy_leaderboard.json
          if git diff --staged --quiet; then
            echo "no leaderboard change"
          else
            git commit -m "lab: weekly strategy leaderboard [skip ci]"
            git push
          fi
