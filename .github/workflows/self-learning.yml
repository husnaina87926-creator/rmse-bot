name: self-learning

# Weekly: discover new candidate edges (gold/BTC/ETH), forward-test them as challengers,
# and PROMOTE (into state/live_rules.json) any that beat their champion on forward data.

on:
  schedule:
    - cron: "0 23 * * 0"        # Sundays 23:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: self-learning
  cancel-in-progress: false

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy PyYAML dukascopy-python

      - name: Run self-learning
        run: python scripts/run_self_learning.py

      - name: Commit candidates + promotions + report
        run: |
          git config user.name "rmse-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --no-edit --rebase || true
          git add -A state/ reports/
          if git diff --staged --quiet; then
            echo "no learning change"
          else
            git commit -m "learn: weekly candidates + promotions [skip ci]"
            git push
          fi
